name: iOS Ad Hoc Distribution

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional Git tag/release name for publishing assets, for example ios-v0.1.0"
        required: false
        type: string
      publish_release:
        description: "Publish the IPA, mobileprovision, and manifest to a GitHub release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  adhoc:
    name: Archive and export Ad Hoc IPA
    runs-on: macos-15
    timeout-minutes: 45
    env:
      PROJECT_PATH: ios/NotiKeeperIOS/NotiKeeperIOS.xcodeproj
      SCHEME: NotiKeeperIOS
      ARCHIVE_PATH: ${{ runner.temp }}/NotiKeeperIOS.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/adhoc-export
      EXPORT_OPTIONS_PATH: ${{ runner.temp }}/ExportOptions-AdHoc.plist
      PROFILE_PLIST_PATH: ${{ runner.temp }}/profile.plist
      PROFILE_RAW_PATH: ${{ runner.temp }}/build_pp.mobileprovision
      CERT_PATH: ${{ runner.temp }}/build_certificate.p12
      KEYCHAIN_PATH: ${{ runner.temp }}/adhoc-signing.keychain-db
      RELEASE_TAG: ${{ inputs.release_tag }}
      SHOULD_PUBLISH: ${{ inputs.publish_release }}
      IOS_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER }}
      IOS_TEAM_ID: ${{ vars.IOS_TEAM_ID }}
      IOS_PROFILE_NAME: ${{ vars.IOS_PROFILE_NAME }}
      IPA_NAME: NotiKeeperIOS-AdHoc.ipa
      PROFILE_NAME: NotiKeeperIOS-AdHoc.mobileprovision
      MANIFEST_NAME: NotiKeeperIOS-AdHoc-manifest.plist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=0
          for key in IOS_BUNDLE_IDENTIFIER IOS_TEAM_ID IOS_PROFILE_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key repo variable is required"
              missing=1
            fi
          done
          for key in BUILD_CERTIFICATE_BASE64 P12_PASSWORD BUILD_PROVISION_PROFILE_BASE64 KEYCHAIN_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key secret is required"
              missing=1
            fi
          done
          if [ "$SHOULD_PUBLISH" = "true" ] && [ -z "${RELEASE_TAG:-}" ]; then
            echo "::error::release_tag is required when publish_release is true"
            missing=1
          fi
          exit "$missing"
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_RAW_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_RAW_PATH" > "$PROFILE_PLIST_PATH"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST_PATH")
          cp "$PROFILE_RAW_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Generate export options plist
        run: |
          set -euo pipefail
          cat > "$EXPORT_OPTIONS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Archive app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            clean archive

      - name: Export Ad Hoc IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH"

          mv "$EXPORT_PATH/NotiKeeperIOS.ipa" "$EXPORT_PATH/$IPA_NAME"
          cp "$PROFILE_RAW_PATH" "$EXPORT_PATH/$PROFILE_NAME"

      - name: Generate OTA manifest
        run: |
          set -euo pipefail
          APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleShortVersionString' "$ARCHIVE_PATH/Info.plist")
          if [ -n "${RELEASE_TAG:-}" ]; then
            ASSET_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          else
            ASSET_BASE_URL="https://example.invalid/replace-with-your-hosted-assets"
          fi

          cat > "$EXPORT_PATH/$MANIFEST_NAME" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>${ASSET_BASE_URL}/${IPA_NAME}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>${IOS_BUNDLE_IDENTIFIER}</string>
                  <key>bundle-version</key>
                  <string>${APP_VERSION}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>NotiKeeperIOS</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-adhoc-package
          path: |
            ${{ env.EXPORT_PATH }}/${{ env.IPA_NAME }}
            ${{ env.EXPORT_PATH }}/${{ env.PROFILE_NAME }}
            ${{ env.EXPORT_PATH }}/${{ env.MANIFEST_NAME }}
            ${{ env.EXPORT_OPTIONS_PATH }}
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "$EXPORT_PATH/$IPA_NAME" \
              "$EXPORT_PATH/$PROFILE_NAME" \
              "$EXPORT_PATH/$MANIFEST_NAME" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$EXPORT_PATH/$IPA_NAME" \
              "$EXPORT_PATH/$PROFILE_NAME" \
              "$EXPORT_PATH/$MANIFEST_NAME" \
              --title "$RELEASE_TAG" \
              --notes "Ad Hoc build for registered devices."
          fi
